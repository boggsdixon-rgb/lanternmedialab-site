<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; form-action 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Thank You — Lantern Media Lab</title>
<style>
  :root { --ink: #17181A; --panel: #E3E2DF; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    color: var(--ink);
    background: #fff;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .card { max-width: 520px; }
  svg.logo { width: 54px; height: 64px; margin-bottom: 18px; }
  h1 {
    font-family: "Rockwell", "Georgia", "Times New Roman", serif;
    font-weight: 700; font-size: 34px; margin-bottom: 14px;
  }
  p { font-size: 17px; line-height: 1.6; color: #3A3B3E; margin-bottom: 28px; }
  a.home {
    display: inline-block; border: 1.5px solid var(--ink); border-radius: 30px;
    padding: 13px 30px; font-size: 14px; font-weight: 700; letter-spacing: 1px;
    color: var(--ink); text-decoration: none;
  }
  a.home:hover { background: var(--ink); color: #fff; }
</style>
</head>
<body>
  <div class="card">
    <svg class="logo" viewBox="0 0 150 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M60 18 Q75 2 90 18" stroke="#17181A" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M48 26 L102 26 L92 42 L58 42 Z" fill="#17181A"/>
      <path d="M40 42 Q30 100 45 150 Q75 168 105 150 Q120 100 110 42 Z" fill="none" stroke="#17181A" stroke-width="6" stroke-linejoin="round"/>
      <path d="M44 150 L106 150 L96 164 L54 164 Z" fill="#17181A"/>
      <circle cx="75" cy="94" r="15" fill="#E8A33D"/>
    </svg>
    <h1>Thanks — we've got it.</h1>
    <p>Your message has been sent to the Lantern Media Lab team. We reply to every note, usually within a couple of business days.</p>
    <a class="home" href="/">Back to the site</a>
  </div>
</body>
</html>
